# Simple Docker Compose for Kali/Local development
# Usage: docker-compose -f docker-compose.simple.yml up --build

services:
  postgres:
    image: postgres:15-alpine
    container_name: dflagger-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dflagger
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: dflagger-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/dflagger?schema=public
      PORT: 4000
      NODE_ENV: development
      JWT_SECRET: dev-secret-key
    ports:
      - "4000:4000"
    depends_on:
      - postgres
    command: >
      sh -c "npx prisma migrate deploy && npm start"

  frontend:
    build: ./frontend/app
    container_name: dflagger-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
