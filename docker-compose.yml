services:
  postgres:
    image: postgres:15-alpine
    container_name: dflagger-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dflagger
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: dflagger-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/dflagger?schema=public
      PORT: 4000
      NODE_ENV: production
      JWT_SECRET: dflagger-secret-key
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && npm start"

  frontend:
    build: ./frontend/app
    container_name: dflagger-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  prisma-studio:
    build: ./backend
    container_name: dflagger-prisma-studio
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/dflagger?schema=public
    ports:
      - "5555:5555"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma generate && npx prisma studio --hostname 0.0.0.0 --port 5555"
    profiles:
      - studio

volumes:
  postgres_data:
