# Render.com deployment configuration
# Learn more: https://render.com/docs/blueprint-spec

services:
  # PostgreSQL Database
  - type: pserv
    name: dflagger-db
    runtime: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile.db
    envVars:
      - key: POSTGRES_USER
        value: postgres
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_DB
        value: dflagger
    disk:
      name: postgres-data
      mountPath: /var/lib/postgresql/data
      sizeGB: 10

  # Backend API
  - type: web
    name: dflagger-backend
    runtime: node
    plan: starter
    buildCommand: cd backend && npm install && npx prisma generate && npm run build
    startCommand: cd backend && npx prisma migrate deploy && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: dflagger-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
    healthCheckPath: /api/health

  # Frontend (Static Site)
  - type: static
    name: dflagger-frontend
    runtime: static
    buildCommand: cd frontend/app && npm install && npm run build
    staticPublishPath: ./frontend/app/dist
    envVars:
      - key: VITE_API_URL
        value: https://dflagger-backend.onrender.com
    routes:
      - type: rewrite
        source: /api/*
        destination: https://dflagger-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
